name: voice_growth_archipelago
description: Native Flutter rebuild of the Voice Growth Archipelago habit app.
publish_to: none
version: 2.1.0+3

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  supabase_flutter: ^2.10.2
  google_fonts: ^6.3.3
  fl_chart: ^1.2.0
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  intl: ^0.20.2
  just_audio: ^0.10.5
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/breathe/sounds/
    - assets/story/

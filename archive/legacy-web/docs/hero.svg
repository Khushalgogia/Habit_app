<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Voice Growth Archipelago hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#1f2a44"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#243a66" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#0f1a33" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <path d="M0 250 C 220 210, 360 310, 560 270 C 760 230, 940 320, 1200 280 L1200 420 L0 420 Z" fill="url(#sea)"/>

  <!-- Islands -->
  <g filter="url(#softGlow)">
    <path d="M180 260 C 140 240, 120 290, 150 320 C 190 355, 270 330, 260 285 C 252 250, 215 250, 180 260 Z"
          fill="#2ee6a6" fill-opacity="0.85"/>
    <path d="M410 255 C 360 235, 340 295, 375 330 C 420 370, 510 330, 495 275 C 483 240, 450 240, 410 255 Z"
          fill="#ff6b6b" fill-opacity="0.65"/>
    <path d="M690 265 C 640 245, 620 305, 655 340 C 700 380, 800 340, 785 285 C 772 245, 735 245, 690 265 Z"
          fill="#8bb3ff" fill-opacity="0.65"/>
    <path d="M960 260 C 910 240, 890 300, 925 335 C 970 375, 1065 335, 1050 280 C 1038 240, 1000 242, 960 260 Z"
          fill="#ffd166" fill-opacity="0.7"/>
  </g>

  <!-- Title -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#eaf0ff">
    <text x="64" y="98" font-size="48" font-weight="700">Voice Growth Archipelago</text>
    <text x="64" y="138" font-size="20" fill="#c6d3ff">
      Habits as islands. Progress as a map. Sync across devices via Google Sheets.
    </text>
  </g>

  <!-- Mini legend -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" fill="#eaf0ff">
    <rect x="64" y="175" width="16" height="16" rx="4" fill="#2ee6a6" />
    <text x="88" y="188" fill="#c6d3ff">Done</text>
    <rect x="150" y="175" width="16" height="16" rx="4" fill="#ff6b6b" />
    <text x="174" y="188" fill="#c6d3ff">Missed</text>
    <rect x="258" y="175" width="16" height="16" rx="4" fill="#3a4768" />
    <text x="282" y="188" fill="#c6d3ff">Not due</text>
  </g>
</svg>

